name: ad-api-notice-watch

on:
  schedule:
    - cron: '23 0,3,6,9 * * *' # 매일 09:23, 12:23, 15:23, 18:23 KST (UTC 00/03/06/09시) — 정각은 혼잡으로 지연/누락이 잦아 23분으로 분산
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # claude-code-action OIDC 토큰 교환용

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Crawl sources
        run: python scripts/crawl.py

      - name: Check for new items
        id: check
        run: |
          if [ -f out/new_items.json ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "신규 공지 있음"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "신규 공지 없음"
          fi

      - name: Summarize with Claude
        if: steps.check.outputs.has_new == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }} # Claude GitHub App 설치 없이 기본 토큰 사용
          prompt: "out/new_items.json을 .claude/skills/notice-summary 기준으로 요약해 out/summary.md로 저장해줘"
          claude_args: "--allowedTools Read,Write"

      - name: Send Slack notification
        if: steps.check.outputs.has_new == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/notify.py

      - name: Commit seen.json
        run: |
          if ! git diff --quiet state/seen.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: seen update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "seen.json 변경 없음"
          fi
